# Free stack: both services can use Render's free tier (cold starts; separate limits from Vercel).
# Set NEXT_PUBLIC_API_BASE_URL on voto-web to your voto-api URL before/after first API deploy.
services:
  - type: web
    name: voto-api
    runtime: python
    rootDir: services/api
    plan: free
    buildCommand: pip install -e .
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: RRGA_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: RRGA_SECRET_KEY
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: RRGA_BOOTSTRAP_ADMIN_EMAIL
        sync: false
      - key: RRGA_BOOTSTRAP_ADMIN_NAME
        sync: false
      - key: RRGA_BOOTSTRAP_API_KEY
        sync: false
      - key: ETHERSCAN_API_KEY
        sync: false
      - key: COINGECKO_API_KEY
        sync: false
      - key: OBJECT_STORAGE_ROOT
        value: /tmp/voto-artifacts

  - type: web
    name: voto-web
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm ci && npm run build:web
    startCommand: npm --prefix apps/web run start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: NEXT_PUBLIC_API_BASE_URL
        # Set this to the public URL of your voto-api service (e.g., https://voto-api.onrender.com)
        sync: false
